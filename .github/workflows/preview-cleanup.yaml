name: Cleanup Preview

on:
  pull_request:
    types: [unlabeled, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup-preview:
    if: |
      (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'deploy/preview')) ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'deploy/preview')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.BOT_PAT }}

      - name: Remove preview directory
        run: |
          PREVIEW_DIR="preview/pr-${PR_NUMBER}"
          if [ -d "$PREVIEW_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PREVIEW_DIR"
            git commit -m "chore: remove preview for PR #${PR_NUMBER}"
            git pull --rebase origin gh-pages
            git push
            echo "✅ Removed $PREVIEW_DIR"
          else
            echo "⏭️ No preview directory found, skipping."
          fi

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const marker = `<!-- preview-url-comment -->`;
            const reason = context.payload.action === 'closed'
              ? 'PR was closed'
              : `label \`${context.payload.label.name}\` was removed`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id,
                body: `${marker}\n🗑️ **Preview removed**\n\n*Cleaned up because ${reason}.*`
              });
            }
