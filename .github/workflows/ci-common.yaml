name: Common CI Steps

on:
  workflow_call:
    inputs:
      with-coverage:
        required: false
        type: boolean
        default: false
      with-e2e:
        required: false
        type: boolean
        default: true
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        id: setup_bun
        with:
          bun-version: latest

      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.arch }}-${{ runner.os }}-bun-${{ steps.setup_bun.outputs.bun-version }}-${{ hashFiles('**/bun.lock', '**/bun.lockb') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      # FIXME: Failed tests when using Playwright cache
      # - uses: actions/cache@v4
      #   id: playwright-cache
      #   if: inputs.with-e2e == true
      #   with:
      #     path: ~/.cache/ms-playwright
      #     key: ${{ runner.arch }}-${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright dependencies
        # if: inputs.with-e2e == true && steps.playwright-cache.outputs.cache-hit != 'true'
        # if: inputs.with-e2e == true
        run: bunx playwright install --with-deps

      - name: Run unit tests
        if: inputs.with-coverage != true
        run: bun run test

      - name: Run unit tests with coverage
        if: inputs.with-coverage == true
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        if: inputs.with-coverage == true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }} && inputs.with-coverage == true
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run E2E tests
        if: inputs.with-e2e == true
        run: bun run test:e2e
